# Configuration OpenAI API
# Add your API key as environment variable: OPENAI_API_KEY
# Or create config.properties.local with your key
openai.api.key=${OPENAI_API_KEY}

# Configuration des services IA
ai.service.enabled=true
ai.suggestions.max_results=5
ai.search.timeout=30000

# Configuration du modèle
ai.model=gpt-3.5-turbo
ai.temperature=0.7
ai.max_tokens=150

# Configuration de l'interface
ui.suggestions.auto_refresh=false
ui.suggestions.cache_duration=300

# Configuration Stripe
# Pour les tests, utilisez les clés de test Stripe
stripe.secret.key=${STRIPE_SECRET_KEY}
stripe.public.key=${STRIPE_PUBLIC_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

# Pour la production, remplacez par vos vraies clés Stripe:
# stripe.secret.key=${STRIPE_LIVE_SECRET_KEY}
# stripe.public.key=${STRIPE_LIVE_PUBLIC_KEY}
# stripe.webhook.secret=${STRIPE_LIVE_WEBHOOK_SECRET}
